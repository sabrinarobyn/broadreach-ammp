# Render Blueprint — deploys the AMMP proxy + dashboard as one web service.
# In Render: New > Blueprint, point it at this repo, and it reads this file.
databases:
  - name: broadreach-om
    plan: free
    databaseName: broadreach_om
    user: broadreach

services:
  - type: web
    name: broadreach-ammp
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: broadreach-om
          property: connectionString
